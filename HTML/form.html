<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulir</title>
</head>
<body>
    <h1>Formulir Isian</h1>
    <form action="/daftar" method="post" >
    
    <div>
        <label for="">Nama Lengkap</label>
    <input type="text" placeholder="Nama" id="name" name="name"> 
</div>
    
    <div>
    <label for="email">email</label>
    <input type="email" placeholder="email" id="email" name="email">
    </div>
    <button>Jangan Kirim</button>
    <div>
    <label for="password">password</label>
    <input type="password" placeholder="password" id="password" name="password">
    <div>

    <div>
    <label for="phone">phone</label>
    <input type="number" placeholder="phone" id="phone" name="phone">
    <div>


    <button type="submit">Kirim</button>

    </form>

    <hr>

    <h1>Pesanan</h1>
    <form action="/order">
        <label for="">Baju</label>
        <div>
        <input type="radio" name="Baju" id="" value="Kemeja" checked> <label for="">Kemeja</label>
        <input type="radio" name="Baju" id="" value="Kaos"> <label for="">Kaos</label>
    </div>

    <div>
        <label for="ukuran">Ukuran</label>
        <select name="ukuran" id="ukuran">
            <option value="-">-</option>
        <option value="s">Small</option>
        <option value="m" selected>Medium</option>
        <option value="l">Large</option>
    </select>
    </div>

    <div>
        <label for="tern">Sesuai pesanan</label>
        <input type="checkbox" name="tern" id="tern" value="1">
    </div>
    <div>
        <p>
        <label for="note">Catatan</label>
    </p>
        <textarea name="note" id="note" cols="60" rows="5"></textarea>
    </div>
        <button type="">Order</button>
    
    </form>

    <hr>

    <h1>Validasi</h1>
    <form action="valid">
        <input type="text" name="input" required minlength="5">
        <input type="number" id="number" min="2" max="5">
        <button type="submit">Kirim</button>
    </form>

</body>
</html>
